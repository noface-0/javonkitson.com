default:
  image: docker:19.03.12

stages:
  - Lint
  - Test

# Lint the webpage
Lint-Webpage:
  image: node:14.18.1
  stage: Lint
  script:
    - cd ./src
    - yarn install --frozen-lockfile
    - yarn lint

# Run the Test cases for the webpage 
Test-Webpage:
  image: node:14.18.1
  stage: Test
  script:
    - cd ./src
    - yarn install --frozen-lockfile
    - yarn test --silent
  needs:
    - job: Lint-Webpage
      optional: false
