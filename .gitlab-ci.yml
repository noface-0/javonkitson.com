default:
  image: docker:19.03.12

variables:
  DOCKER_HOST: tcp://docker:2375/
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

stages:
  - Lint
  - Test
  - Build
  - Deploy

# Lint the webpage
Lint:
  image: node:14.18.1
  stage: Lint
  script:
    - cd ./src
    - yarn install --frozen-lockfile
    - yarn lint

# Run the Test cases for the webpage 
Test:
  image: node:14.18.1
  stage: Test
  script:
    - cd ./src
    - yarn install --frozen-lockfile
    - yarn test --silent
  needs:
    - job: Lint
      optional: false

 Build:
  stage: Build
  services:
   - name: docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -t website .
  needs:
    - job: Test
      optional: false
  tags:
    - website

Deploy:
  stage: Deploy
  services:
   - name: docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker run -d -p 80:80 --name website website:latest
  needs:
    - job: Build
      optional: false
  tags:
    - website
