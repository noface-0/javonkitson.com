
version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 12
    commands:
      - echo Installing source NPM dependencies...
      - yarn install --frozen-lockfile

  pre_build:
    commands:
      - echo Linting...
      - yarn lint

  build:
    commands:
      - echo Building the Website app...
      - yarn build

  post_build:
    commands:
      - cp package.json build/
      - echo Build completed on `date`

artifacts:
  files:
    - '**/*'
  base-directory: 'build'

cache:
  paths:
    - 'node_modules/**/*'
